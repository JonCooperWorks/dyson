<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <meta name="description" content="Dyson — AI agent controller."/>
  <meta name="color-scheme" content="dark light"/>
  <meta name="theme-color" content="#161922"/>
  <title>Dyson — controller</title>
  <script>
    /* Apply the saved theme before first paint to avoid a flash. Prefer the
       cross-subdomain cookie (shared with the swarm + sibling dysons), then
       fall back to localStorage. "system"/no value leaves data-theme unset so
       the CSS follows the OS. */
    try {
      var c = (document.cookie.match(/(?:^|;\s*)dyson-theme=([^;]*)/) || [])[1];
      var m = c || localStorage.getItem('dyson-theme');
      if (m === 'light' || m === 'dark') document.documentElement.setAttribute('data-theme', m);
    } catch (e) {}
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
